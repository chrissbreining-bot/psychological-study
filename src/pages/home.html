<template>
    <require from="resources/value-converters/json-value-converter"></require>
    <require from="resources/value-converters/integer-value-converter"></require>
    <require from="resources/value-converters/number-value-converter"></require>
    <require from="resources/value-converters/integer-array-value-converter"></require>
    <require from="resources/value-converters/flag-value-converter"></require>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: auto !important; 
            height: auto !important;
            margin: 0;
            padding: 20px;
        }

        .input {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }

        .input label {
            width: 220px;
            font-size: 0.9em;
            color: #ccc;
        }

        .input label + * {
            box-sizing: border-box;
            max-width: 350px;
        }

        .input input[type=text], 
        .input input[type=number], 
        textarea {
            flex: 1 1 100%;
            min-width: 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 6px;
        }

        .config-section {
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            background: #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .main-flex-container {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        pre {
            max-width: 100%;
            overflow-x: auto;
            background: #000;
            padding: 15px;
            border: 1px solid #333;
            color: #00ff00;
            font-size: 0.85em;
        }

        h1, h2 { border-bottom: 1px solid #333; padding-bottom: 10px; }
        button { cursor: pointer; padding: 6px 12px; margin: 2px; transition: 0.2s; }
        .btn-main { background: #0078d4; color: white; border: none; padding: 12px 24px; font-weight: bold; }
        
        .hint { font-size: 0.8em; color: #888; margin-top: 4px; display: block; }
    </style>

    <div class="main-flex-container">
        <div style="margin-right: 30px; flex: 1 1 700px;">
            <h1>Cyberball Builder (Pro Version)</h1>

            <div class="config-section">
                <h2>Player (Subject)</h2>
                <div class="input">
                    <label>Name</label>
                    <input type="text" value.bind="settings.player.name" />
                </div>
                <div class="input">
                    <label>Tint Color</label>
                    <input type="color" value.bind="settings.player.tint" />
                </div>
                <div class="input">
                    <label>Portrait URL</label>
                    <input type="text" value.bind="settings.player.portrait" />
                </div>
                
                <div style="margin: 15px 0 5px 0; font-weight: bold;">Leave Triggers</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <label><input type="checkbox" checked.bind="settings.player.leaveTrigger | flag:settings.player.leaveTrigger:1" /> Throws Elapsed</label>
                    <label><input type="checkbox" checked.bind="settings.player.leaveTrigger | flag:settings.player.leaveTrigger:2" /> Time Elapsed</label>
                    <label><input type="checkbox" checked.bind="settings.player.leaveTrigger | flag:settings.player.leaveTrigger:4" /> Throws Ignored</label>
                    <label><input type="checkbox" checked.bind="settings.player.leaveTrigger | flag:settings.player.leaveTrigger:16" /> Time Ignored</label>
                </div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between;">
                <h2>Computer Players (CPUs)</h2>
                <div>
                    <button click.delegate="addCPU()">+ Add CPU</button>
                    <button click.delegate="removeCPU()">- Remove</button>
                </div>
            </div>

            <div repeat.for="cpu of settings.computerPlayers" class="config-section" style="border-left: 4px solid #0078d4;">
                <h3 style="margin-top:0; color: #0078d4;">CPU #${$index + 1}: ${cpu.name}</h3>
                <div class="input">
                    <label>Name</label>
                    <input type="text" value.bind="cpu.name" />
                </div>
                <div class="input">
                    <label>Portrait URL</label>
                    <input type="text" value.bind="cpu.portrait" />
                </div>
                <div class="input">
                    <label>Target Preference (Weights)</label>
                    <div style="display: flex; gap: 5px;">
                        <input repeat.for="target of cpu.targetPreference" type="number" style="width: 55px;" value.bind="cpu.targetPreference[$index] | integer" />
                    </div>
                </div>

                <div style="margin-top:10px; border-top: 1px solid #333; padding-top:10px;">
                    <span class="hint">Delays: Catch & Throw (ms) + Variance</span>
                    <div class="input">
                        <label>Catch/Throw Delay</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" value.bind="cpu.catchDelay | integer" placeholder="Catch" />
                            <input type="number" value.bind="cpu.throwDelay | integer" placeholder="Throw" />
                        </div>
                    </div>
                    <div class="input">
                        <label>Delay Variances</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" value.bind="cpu.catchDelayVariance | integer" placeholder="C-Var" />
                            <input type="number" value.bind="cpu.throwDelayVariance | integer" placeholder="T-Var" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <h2>Gameplay & Logic</h2>
                <div class="input">
                    <label>Total Throw Count</label>
                    <input type="number" value.bind="settings.throwCount | integer" />
                </div>
                <div class="input">
                    <label>Ball Speed (px/sec)</label>
                    <input type="number" value.bind="settings.ballSpeed | integer" />
                </div>
                <div class="input">
                    <label>Ball Tint Color</label>
                    <input type="color" value.bind="settings.ballTint" />
                </div>
                
                <div class="input">
                    <label>Use Preset Schedule</label>
                    <input type="checkbox" checked.bind="settings.useSchedule" />
                </div>
                <div class="input" if.bind="settings.useSchedule">
                    <label>Schedule (e.g. 1, 2, 0...)</label>
                    <div style="flex-grow: 1;">
                        <textarea value.bind="settings.schedule | integerArray & updateTrigger:'blur'" placeholder="Comma separated player indices"></textarea>
                        <span class="hint">0=Player, 1=CPU1, 2=CPU2...</span>
                    </div>
                </div>

                <div class="input">
                    <label>Game Over Text</label>
                    <input type="text" value.bind="settings.gameOverText" />
                </div>
            </div>

            <div class="config-section" style="text-align: center;">
                <button class="btn-main" click.delegate="saveSettings()">Apply Settings & Generate Code</button>
            </div>
        </div>

        <div style="flex: 1 1 400px; position: sticky; top: 20px;">
            <h3>Config Preview (JSON)</h3>
            <pre>${settings | json & signal: 'save-settings'}</pre>
        </div>
    </div>

    <div style="margin-top: 40px; padding-bottom: 100px;">
        <h2>Deployment</h2>
        <div class="config-section">
            <p>Embed this code in your survey (WJX/Qualtrics):</p>
            <pre id="code" style="color: #61afef;">&lt;iframe id="cyberball" width="100%" height="600" src="${url}"&gt;&lt;/iframe&gt;</pre>
            <div style="margin-top: 15px;">
                <button id="copy" data-clipboard-target="#code">📋 Copy Code</button>
                <button click.delegate="testGame()" style="background: #28a745; color: white; border: none;">🚀 Test in New Tab</button>
            </div>
        </div>
    </div>
</template>
