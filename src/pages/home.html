<template>
    <require from="resources/value-converters/json-value-converter"></require>
    <require from="resources/value-converters/integer-value-converter"></require>
    <require from="resources/value-converters/number-value-converter"></require>
    <require from="resources/value-converters/integer-array-value-converter"></require>
    <require from="resources/value-converters/flag-value-converter"></require>

    <style>
        body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; }
        .config-container { height: 100vh; overflow-y: auto; padding: 20px; box-sizing: border-box; background: #111; }
        .input { display: flex; margin-bottom: 10px; align-items: center; }
        .input label { width: 220px; flex-shrink: 0; font-size: 0.9em; color: #ccc; }
        .input input[type=text], .input input[type=number], textarea { flex: 1; max-width: 300px; background: #222; color: #fff; border: 1px solid #444; padding: 4px; }
        .column { display: flex; flex-direction: column; margin: 10px 0 10px 20px; padding-left: 15px; border-left: 2px solid #0078d4; }
        .cpu-card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .json-preview { position: sticky; top: 0; width: 350px; flex-shrink: 0; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #444; font-size: 12px; height: fit-content; max-height: 90vh; overflow-y: auto; }
        h2 { color: #0078d4; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .btn-primary { background: #0078d4; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        .btn-secondary { background: #444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-left: 5px; }
    </style>

    <div class="config-container">
        <div style="display: flex; align-items: flex-start;">
            
            <div style="flex: 1; margin-right: 30px;">
                <h1>Cyberball Configurator</h1>

                <section>
                    <h2>1. Player (Subject)</h2>
                    <div class="input">
                        <label>Name</label>
                        <input type="text" value.bind="settings.player.name" />
                    </div>
                    <div class="input">
                        <label>Tint Color</label>
                        <input type="color" value.bind="settings.player.tint" />
                    </div>
                </section>

                <section>
                    <h2>2. Computer Players (CPUs) 
                        <button class="btn-secondary" click.delegate="addCPU()">+ Add</button>
                        <button class="btn-secondary" click.delegate="removeCPU()">- Remove</button>
                    </h2>

                    <div repeat.for="cpu of settings.computerPlayers" class="cpu-card">
                        <div style="font-weight: bold; margin-bottom: 10px; color: #0078d4;">CPU #${$index + 1}</div>
                        
                        <div class="input">
                            <label>Name</label>
                            <input type="text" value.bind="cpu.name" />
                        </div>

                        <div class="input">
                            <label>Tint Color</label>
                            <input type="color" value.bind="cpu.tint" />
                        </div>

                        <div class="input">
                            <label>Throw Delay / Variance (ms)</label>
                            <input type="number" value.bind="cpu.throwDelay | integer" placeholder="Base" style="width: 80px; flex: none; margin-right: 10px;" />
                            <input type="number" value.bind="cpu.throwDelayVariance | integer" placeholder="Var" style="width: 80px; flex: none;" />
                        </div>

                        <div class="input">
                            <label>Catch Delay / Variance (ms)</label>
                            <input type="number" value.bind="cpu.catchDelay | integer" placeholder="Base" style="width: 80px; flex: none; margin-right: 10px;" />
                            <input type="number" value.bind="cpu.catchDelayVariance | integer" placeholder="Var" style="width: 80px; flex: none;" />
                        </div>

                        <div class="input">
                            <label>Target Weights (Array)</label>
                            <div style="display: flex; gap: 5px;">
                                <input repeat.for="target of cpu.targetPreference" type="number" value.bind="cpu.targetPreference[$index] | integer" style="width: 45px;" />
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2>3. Gameplay Logic</h2>
                    <div class="input">
                        <label>Total Throw Count</label>
                        <input type="number" value.bind="settings.throwCount | integer" />
                    </div>

                    <div class="input">
                        <label>Use Predefined Schedule</label>
                        <input type="checkbox" checked.bind="settings.useSchedule" />
                    </div>

                    <div class="column" if.bind="settings.useSchedule">
                        <div class="input">
                            <label>Schedule (e.g. 1, 2, 3)</label>
                            <textarea value.bind="settings.schedule | integerArray & updateTrigger:'blur'"></textarea>
                        </div>
                        
                        <div class="input" style="margin-top: 5px;">
                            <label style="width: auto; margin-right: 10px;">Honors Throw Count?</label>
                            <input type="checkbox" checked.bind="settings.scheduleHonorsThrowCount" />
                            <small style="color: #888; margin-left: 10px;">(If checked, game stops at Max Throws even if schedule isn't finished)</small>
                        </div>
                    </div>

                    <div class="input">
                        <label>Ball Speed</label>
                        <input type="number" value.bind="settings.ballSpeed | integer" />
                    </div>
                </section>

                <div style="margin: 40px 0;">
                    <button class="btn-primary" click.delegate="saveSettings()">Save Configuration</button>
                    <button class="btn-secondary" click.delegate="testGame()">Test in Game</button>
                </div>

                <section style="background: #000; padding: 20px;">
                    <h3>Generated IFrame Code</h3>
                    <pre id="code" style="color: #00ff00; font-size: 13px;">&lt;iframe id="cyberball" width="100%" height="580" src="${url}"&gt;&lt;/iframe&gt;</pre>
                    <button class="btn-secondary" id="copy" data-clipboard-target="#code">Copy to Clipboard</button>
                </section>
            </div>

            <div class="json-preview">
                <div style="color: #0078d4; font-weight: bold; margin-bottom: 10px;">LIVE SETTINGS JSON</div>
                <pre style="background: transparent; padding: 0;">${settings | json & signal: 'save-settings'}</pre>
            </div>

        </div>
    </div>
</template>
